<title>销售追踪看板</title>
<style>
:root{--bg:#f3f0fd;--surface:#f8f5ff;--card:#ffffff;--border:#d8d0f0;--accent:#7c5cbf;--accent2:#9b7de0;--warn:#d94f6a;--gold:#c47d20;--text:#1a1a2d;--muted:#9080b0;--green:#3db88a;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:"PingFang SC","Microsoft YaHei",sans-serif;min-height:100vh;}
.header{background:linear-gradient(135deg,#f0eeff,#e8e0ff);border-bottom:1px solid #d0c8f0;padding:16px 32px;display:flex;box-shadow:0 1px 4px rgba(0,0,0,.06);align-items:center;justify-content:space-between;}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(90deg,#7c5cbf,#9b7de0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header .subtitle{font-size:11px;color:var(--muted);margin-top:3px;}
.period-badge{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 12px;font-size:12px;color:var(--accent2);}
.upload-zone{margin:14px 32px;background:var(--card);border:2px dashed #c8b8f0;border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s;}
.upload-zone:hover{border-color:var(--accent);}
.upload-zone input{display:none;}
.upload-icon{width:38px;height:38px;background:rgba(124,92,191,.1);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.upload-text strong{display:block;font-size:13px;margin-bottom:2px;}
.upload-text span{font-size:11px;color:var(--muted);}
.upload-btn{margin-left:auto;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;}
.upload-status{font-size:11px;color:var(--green);margin-top:2px;}
.tab-bar{display:flex;border-bottom:1px solid var(--border);padding:0 32px;background:var(--surface);}
.tab-btn{padding:11px 22px;font-size:13px;font-family:inherit;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-weight:500;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;padding:14px 32px;}
.sum-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,.04);}
.sum-card .label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.sum-card .value{font-size:20px;font-weight:700;}
.sum-card .sub{font-size:10px;color:var(--muted);margin-top:2px;}
.sum-card.v1 .value{color:var(--accent);}
.sum-card.v2 .value{color:var(--accent2);}
.sum-card.v3 .value{color:var(--gold);}
.sum-card.v4 .value{color:var(--green);}
/* STORE TAB */
.main{display:grid;grid-template-columns:250px 1fr;min-height:calc(100vh - 270px);}
.side-list{background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 270px);}
.side-search{padding:11px 13px;border-bottom:1px solid var(--border);}
.side-search input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;}
.side-search input:focus{border-color:var(--accent);}
.grp-title{font-size:9px;color:var(--muted);letter-spacing:.08em;padding:7px 13px 2px;text-transform:uppercase;}
.side-item{display:flex;align-items:center;padding:8px 13px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;gap:8px;}
.side-item:hover{background:rgba(124,92,191,.07);}
.side-item.active{background:rgba(124,92,191,.12);border-left-color:var(--accent);}
.side-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.side-name{font-size:12px;flex:1;line-height:1.3;}
.side-badge{font-size:10px;color:var(--accent2);white-space:nowrap;}
.content{padding:18px 22px;overflow-y:auto;max-height:calc(100vh - 270px);}
.content-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;}
.page-title{font-size:17px;font-weight:700;}
.page-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.sort-tabs{display:flex;gap:4px;}
.sort-tab{background:var(--card);border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s;}
.sort-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px 13px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.stat-box .s-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
.stat-box .s-val{font-size:17px;font-weight:700;color:var(--accent);}
.stat-box .s-val.g{color:var(--green);}
.stat-box .s-val.y{color:var(--gold);}
.stat-box .s-val.o{color:var(--warn);}
.sec-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px;display:flex;align-items:center;gap:7px;}
.sec-title::after{content:"";flex:1;height:1px;background:var(--border);}
.top-table{width:100%;border-collapse:collapse;}
.top-table th{font-size:10px;color:var(--muted);text-align:left;padding:6px 9px;border-bottom:1px solid var(--border);font-weight:600;letter-spacing:.04em;}
.top-table th.r{text-align:right;}
.top-table td{padding:9px 9px;border-bottom:1px solid rgba(180,170,220,.4);font-size:12px;}
.top-table tr:last-child td{border-bottom:none;}
.top-table tr:hover td{background:rgba(124,92,191,.05);}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:5px;font-size:10px;font-weight:700;}
.rank-1{background:#ffd166;color:#1a1d27;}
.rank-2{background:#c0c0c0;color:#1a1d27;}
.rank-3{background:#cd7f32;color:#fff;}
.rank-n{background:#e8e0f5;color:#9080b0;}
.td-r{text-align:right;font-variant-numeric:tabular-nums;}
.inv-ok{color:var(--green);font-weight:600;}
.inv-low{color:var(--gold);font-weight:600;}
.inv-out{color:var(--warn);font-weight:600;}
.inv-neg{color:#ff4757;font-weight:600;}
.bar-wrap{display:flex;align-items:center;gap:5px;}
.bar-bg{flex:1;background:#e4ddf5;border-radius:3px;height:5px;max-width:55px;}
.bar-fill{height:5px;border-radius:3px;background:linear-gradient(90deg,#d4567a,#e8729a);}
.disc-tag{font-size:9px;background:rgba(217,79,106,.1);color:var(--warn);border-radius:3px;padding:1px 4px;margin-left:3px;}
/* BRAND TAB */
#brandTab{padding:18px 32px;overflow-y:auto;max-height:calc(100vh - 270px);}
.brand-selector{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
.brand-btn{display:flex;align-items:center;gap:8px;background:var(--card);border:2px solid var(--border);border-radius:10px;padding:10px 18px;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);transition:all .2s;}
.brand-btn:hover{border-color:var(--accent);}
.brand-btn.active{border-color:var(--accent);background:rgba(108,99,255,.12);}
.brand-btn .b-dot{width:9px;height:9px;border-radius:50%;}
.brand-btn .b-info{text-align:left;}
.brand-btn .b-name{font-weight:700;font-size:13px;}
.brand-btn .b-sub{font-size:10px;color:var(--muted);margin-top:1px;}
/* BRAND ITEM LIST */
.brand-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:18px;}
.brand-item-row{background:var(--card);border:1px solid var(--border);border-radius:9px;margin-bottom:8px;overflow:hidden;}
.brand-item-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;transition:background .15s;}
.brand-item-header:hover{background:rgba(124,92,191,.05);}
.brand-item-header.open{background:rgba(124,92,191,.07);border-bottom:1px solid var(--border);}
.bi-rank{flex-shrink:0;}
.bi-info{flex:1;}
.bi-name{font-size:13px;font-weight:600;}
.bi-sku{font-size:10px;color:var(--muted);margin-top:1px;}
.bi-totals{display:flex;gap:16px;flex-shrink:0;}
.bi-total{text-align:right;}
.bi-total .bt-label{font-size:9px;color:var(--muted);}
.bi-total .bt-val{font-size:12px;font-weight:700;}
.bi-arrow{font-size:11px;color:var(--muted);flex-shrink:0;transition:transform .2s;}
.bi-arrow.open{transform:rotate(180deg);}
/* STORE BREAKDOWN */
.store-breakdown{display:none;padding:10px 14px 12px;}
.store-breakdown.open{display:block;}
.sb-table{width:100%;border-collapse:collapse;}
.sb-table th{font-size:9px;color:var(--muted);text-align:left;padding:5px 8px;border-bottom:1px solid var(--border);letter-spacing:.04em;}
.sb-table th.r{text-align:right;}
.sb-table td{padding:7px 8px;border-bottom:1px solid rgba(180,170,220,.3);font-size:11px;}
.sb-table tr:last-child td{border-bottom:none;}
.sb-table tr:hover td{background:rgba(124,92,191,.05);}
.inv-bar{display:flex;align-items:center;gap:5px;}
.inv-bar-bg{width:50px;background:var(--border);border-radius:2px;height:4px;}
.inv-bar-fill{height:4px;border-radius:2px;background:var(--gold);}
.no-sale{color:var(--muted) !important;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:50px 20px;color:var(--muted);text-align:center;}
.empty .e-icon{font-size:44px;margin-bottom:12px;}
.empty p{font-size:13px;line-height:1.6;}



.date-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 32px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.date-bar label{font-size:12px;color:var(--muted);}
.date-input{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:5px 10px;color:var(--text);font-size:12px;font-family:inherit;outline:none;cursor:pointer;}
.date-input:focus{border-color:var(--accent);}
.date-apply{background:var(--accent);color:#fff;border:none;border-radius:7px;padding:6px 16px;font-size:12px;cursor:pointer;font-family:inherit;transition:opacity .2s;}
.date-apply:hover{opacity:.85;}
.date-reset{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;}
.date-reset:hover{color:var(--text);}
.date-range-label{font-size:11px;color:var(--accent2);background:rgba(78,205,196,.1);border-radius:6px;padding:3px 10px;}


.export-btn{background:#fff;color:var(--accent);border:1.5px solid var(--accent);border-radius:7px;padding:5px 13px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:5px;}
.export-btn:hover{background:var(--accent);color:#fff;}



/* Bar chart */
.bar-chart{display:flex;flex-direction:column;gap:7px;}
.bc-row{display:flex;align-items:center;gap:8px;}
.bc-label{font-size:11px;color:var(--text);width:140px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;}
.bc-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:18px;position:relative;}
.bc-bar{height:18px;border-radius:4px;display:flex;align-items:center;padding-left:7px;transition:width .4s ease;}
.bc-val{font-size:10px;color:#fff;font-weight:600;white-space:nowrap;}
.bc-val-out{font-size:10px;color:var(--muted);margin-left:6px;white-space:nowrap;}
/* Top20 table */
.g-table{width:100%;border-collapse:collapse;}
.g-table th{font-size:10px;color:var(--muted);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border);font-weight:600;}
.g-table th.r{text-align:right;}
.g-table td{padding:9px 10px;border-bottom:1px solid rgba(180,170,220,.3);font-size:12px;}
.g-table tr:last-child td{border-bottom:none;}
.g-table tr:hover td{background:rgba(124,92,191,.04);}
/* Warning cards */
.warn-list{display:flex;flex-direction:column;gap:8px;}
.warn-item{display:flex;align-items:center;gap:10px;background:#fff8f0;border:1px solid #f0d0a0;border-radius:8px;padding:10px 14px;}
.warn-item.dead{background:#fff0f0;border-color:#f0c0c0;}
.warn-icon{font-size:18px;flex-shrink:0;}
.warn-info{flex:1;}
.warn-name{font-size:12px;font-weight:600;}
.warn-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.warn-val{font-size:12px;font-weight:700;text-align:right;flex-shrink:0;}
/* Restock table */
.restock-badge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;}
.restock-urgent{background:rgba(240,80,80,.15);color:#d04040;}
.restock-soon{background:rgba(240,165,0,.15);color:#c07000;}
.restock-ok{background:rgba(6,210,160,.15);color:#059970;}
@media(max-width:900px){.g-grid-2{grid-template-columns:1fr;}}


/* RANKING */
.rank-bar-row{display:flex;align-items:center;gap:12px;margin-bottom:10px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;transition:all .15s;cursor:pointer;}
.rank-bar-row:hover{box-shadow:0 2px 8px rgba(124,92,191,.1);}
.rank-num{width:28px;font-size:12px;font-weight:700;color:var(--muted);text-align:right;flex-shrink:0;}
.rank-store-name{width:160px;font-size:12px;flex-shrink:0;font-weight:500;}
.rank-bar-wrap{flex:1;background:var(--border);border-radius:4px;height:18px;position:relative;}
.rank-bar-fill{height:18px;border-radius:4px;background:linear-gradient(90deg,var(--accent),#9b7de0);display:flex;align-items:center;padding-left:8px;min-width:2px;}
.rank-bar-label{font-size:10px;color:#fff;font-weight:600;white-space:nowrap;}
.rank-meta{width:90px;text-align:right;font-size:11px;color:var(--muted);flex-shrink:0;}
.inv-health-ok{color:var(--green);}
.inv-health-warn{color:var(--gold);}
.inv-health-bad{color:var(--warn);}
/* HOT */

.hot-row{background:var(--card);border:1px solid var(--border);border-radius:10px;margin-bottom:8px;overflow:hidden;}
.hot-row-header{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
.hot-row-header:hover{background:rgba(124,92,191,.05);}
.hot-row-header.open{background:rgba(124,92,191,.07);border-bottom:1px solid var(--border);}
.hot-row-detail{display:none;padding:10px 14px 12px;}
.hot-row-detail.open{display:block;}

.hot-days-ok{background:rgba(6,214,160,.12);color:var(--green);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
.hot-days-warn{background:rgba(196,125,32,.12);color:var(--gold);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
.hot-days-urgent{background:rgba(224,80,80,.12);color:var(--warn);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
.hot-days-out{background:rgba(224,80,80,.2);color:var(--warn);border-radius:5px;padding:2px 8px;font-size:11px;font-weight:700;}
/* STALE badge */
.stale-badge{display:inline-block;background:rgba(155,125,224,.12);color:var(--accent);border:1px solid rgba(124,92,191,.2);border-radius:4px;padding:1px 6px;font-size:10px;margin-left:6px;cursor:pointer;}
.stale-badge:hover{background:rgba(124,92,191,.2);}


.chart-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:18px;}
.chart-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.chart-title::after{content:"";flex:1;height:1px;background:var(--border);}
.chart-wrap{position:relative;height:220px;}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#c8b8f0;border-radius:3px;}
@media(max-width:900px){
  .main{grid-template-columns:1fr;}
  .side-list{max-height:180px;}
  .summary-row,.stats-row,.brand-stats{grid-template-columns:repeat(2,1fr);}
  .brand-selector{gap:8px;}
  .bi-totals{gap:8px;}
}

<body>


<div class="header">
  <div><h1>🏪 销售追踪看板</h1><div class="subtitle">店铺销售 · 品牌钻取分析 · 库存状态</div></div>
  <div class="period-badge" id="periodBadge">3月1日 – 18日</div>
</div>
<div class="upload-zone" onclick="document.getElementById('fileInput').click()">
  <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="handleFile(event)">
  <div class="upload-icon">📂</div>
  <div class="upload-text">
    <strong>上传新数据</strong>
    <span>支持 .xlsx，需包含「销售明细」和「库存」工作表</span>
    <div class="upload-status" id="uploadStatus">当前：3月1日–18日销售明细（已加载）</div>
  </div>
  <button class="upload-btn" onclick="event.stopPropagation();document.getElementById('fileInput').click()">选择文件</button>
</div>

<div class="date-bar" id="dateBar">
  <label>📅 日期范围：</label>
  <input type="date" id="dateFrom" class="date-input" value="2026-03-01">
  <span style="color:var(--muted);font-size:12px">至</span>
  <input type="date" id="dateTo" class="date-input" value="2026-03-18">
  <button class="date-apply" onclick="applyDateFilter()">筛选</button>
  <button class="date-reset" onclick="resetDateFilter()">重置</button>
  <span class="date-range-label" id="dateRangeLabel">3月1日 – 18日 · 全部数据</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('store')">🏬 店铺追踪</button>
  <button class="tab-btn" onclick="switchTab('brand')">🏷️ 品牌分析</button>
  <button class="tab-btn" onclick="switchTab('ranking')">📊 门店排名</button>
  <button class="tab-btn" onclick="switchTab('hot')">🏆 全网爆款</button>
</div>
<div class="summary-row">
  <div class="sum-card v1"><div class="label">参与门店</div><div class="value" id="sc1">—</div><div class="sub">有销售记录</div></div>
  <div class="sum-card v2"><div class="label">总零售金额</div><div class="value" id="sc2">—</div><div class="sub">标牌价合计</div></div>
  <div class="sum-card v3"><div class="label">总成交金额</div><div class="value" id="sc3">—</div><div class="sub">实际收款合计</div></div>
  <div class="sum-card v4"><div class="label">总库存金额</div><div class="value" id="sc4">—</div><div class="sub">在店库存价值</div></div>
</div>
<!-- STORE TAB -->
<div id="storeTab" class="main">
  <div class="side-list">
    <div class="side-search"><input type="text" id="storeSearch" placeholder="搜索门店..." oninput="filterStores()"></div>
    <div id="storeItems"></div>
  </div>
  <div class="content" id="storeContent">
    <div class="empty"><div class="e-icon">👈</div><p>请从左侧选择门店</p></div>
  </div>
</div>
<!-- BRAND TAB -->
<div id="brandTab" style="display:none">
  <div style="padding:16px 32px 0">
    <div class="brand-selector" id="brandSelector"></div>
  </div>
  <div id="brandContent" style="padding:0 32px 24px;overflow-y:auto;max-height:calc(100vh - 360px);">
    <div class="empty"><div class="e-icon">👆</div><p>选择上方品牌查看 Top 30 单品<br>及各店铺销售与库存明细</p></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>




// ── DATA ──────────────────────────────────────────────────────────────────────
let RAW_SALES = [];
let RAW_INV = [];
const INIT_STORE = {"storeData":{},"storeInv":{},"storeSales":{}};
const INIT_BRAND = {};

let DATA         = INIT_STORE;
let BDATA        = INIT_BRAND;
let dateFrom     = 20260301;
let dateTo       = 20260318;
let currentStore = null;
let currentBrand = null;
let sortMode     = 'amount';
let brandSortMode= 'amount';
let activeTab    = 'store';
let openItems    = new Set();

const BRAND_PALETTE = ["#c75b7a","#6c63ff","#ffd166","#4ecdc4","#06d6a0","#ff6b6b","#e07b9a","#2bb5ad"];
const BRAND_DOT = {};
const STORE_DOT  = {"创美":"#6c63ff","江苏":"#4ecdc4","秦西厢":"#ffd166","美丽":"#ff6b6b","上海":"#4ecdc4"};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function fmt(n,d=0){if(n===undefined||n===null)return"—";if(Math.abs(n)>=10000)return(n/10000).toFixed(1)+"万";return Number(n).toLocaleString("zh-CN",{minimumFractionDigits:d,maximumFractionDigits:d});}
function storeDot(n){for(const[k,c]of Object.entries(STORE_DOT))if(n.startsWith(k))return c;return"#7b82a0";}
function disc(r,a){if(!r||r<=0)return null;const d=Math.round((a/r)*10)/10;if(d>=1)return null;return Math.round(d*10)+"折";}
function invCls(q){return q<0?"inv-neg":q===0?"inv-out":q<=2?"inv-low":"inv-ok";}
function invLbl(q){return q<0?"负库存":q===0?"售罄":q<=2?"低库存":"正常";}
function fmtDate(s){const c=s.replace(/-/g,'');return parseInt(c.substring(4,6))+"月"+parseInt(c.substring(6,8))+"日";}

function colorTags(sc,ic){
  const all=new Set([...Object.keys(sc||{}), ...Object.keys(ic||{})]);
  if(!all.size)return'';
  let t='';
  for(const c of all){
    const sold=(sc||{})[c]||0, stock=(ic||{})[c]||0;
    const isOut=stock===0&&sold>0, isLow=stock>0&&stock<=2;
    const bg=isOut?'rgba(240,78,78,.12)':isLow?'rgba(240,165,0,.12)':'rgba(124,92,191,.08)';
    const border=isOut?'#f04e4e':isLow?'#e08a30':'#f0d0d8';
    const icon=isOut?'⛔':isLow?'⚠️':'';
    t+=`<span style="display:inline-flex;align-items:center;gap:2px;background:${bg};border:1px solid ${border};border-radius:3px;padding:1px 5px;font-size:9px;margin:1px 2px;white-space:nowrap">${icon}${c}<span style="color:var(--muted);margin-left:2px">售${sold}/存${stock}</span></span>`;
  }
  return`<div style="margin-top:4px;line-height:1.8">${t}</div>`;
}

// ── SUMMARY ───────────────────────────────────────────────────────────────────
function initSummary(){
  const filtered=RAW_SALES.filter(r=>r['日期']>=dateFrom&&r['日期']<=dateTo);
  const stores=new Set(filtered.map(r=>r['店仓'])).size;
  const totalRetail=filtered.reduce((a,r)=>a+(r['零售金额']||0),0);
  const totalActual=filtered.reduce((a,r)=>a+(r['成交金额']||0),0);
  const totalInv=Object.values(DATA.storeInv).filter(v=>v.总库存金额>0).reduce((a,v)=>a+v.总库存金额,0);
  document.getElementById("sc1").textContent=stores||Object.keys(DATA.storeData).length;
  document.getElementById("sc2").textContent="¥"+fmt(totalRetail);
  document.getElementById("sc3").textContent="¥"+fmt(totalActual);
  document.getElementById("sc4").textContent="¥"+fmt(totalInv);
}

// ── DATE FILTER ───────────────────────────────────────────────────────────────
function applyDateFilter(){
  const f=document.getElementById('dateFrom').value.replace(/-/g,'');
  const t=document.getElementById('dateTo').value.replace(/-/g,'');
  if(!f||!t)return;
  dateFrom=parseInt(f); dateTo=parseInt(t);
  document.getElementById('dateRangeLabel').textContent=fmtDate(f)+' – '+fmtDate(t);
  document.getElementById('periodBadge').textContent=fmtDate(f)+' – '+fmtDate(t);
  rebuildFromRaw();
}

function resetDateFilter(){
  const dates=RAW_SALES.map(r=>r['日期']).filter(Boolean);
  if(dates.length){
    dateFrom=Math.min(...dates); dateTo=Math.max(...dates);
    const toStr=d=>{const s=String(d);return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);};
    document.getElementById('dateFrom').value=toStr(dateFrom);
    document.getElementById('dateTo').value=toStr(dateTo);
  } else {
    dateFrom=20260301; dateTo=20260318;
    document.getElementById('dateFrom').value='2026-03-01';
    document.getElementById('dateTo').value='2026-03-18';
  }
  document.getElementById('dateRangeLabel').textContent='全部数据';
  document.getElementById('periodBadge').textContent='3月1日 – 18日';
  rebuildFromRaw();
}

function rebuildFromRaw(){
  const filtered=RAW_SALES.filter(r=>r['日期']>=dateFrom&&r['日期']<=dateTo);
  // Store sales map
  const saleMap={}, stSales={};
  for(const r of filtered){
    const store=r['店仓'],sku=r['款号'],name=r['品名'],color=r['颜色']||'';
    const qty=r['数量']||0,ret=r['零售金额']||0,act=r['成交金额']||0;
    const k=store+'||'+sku+'||'+name;
    if(!saleMap[k])saleMap[k]={store,sku,name,qty:0,ret:0,act:0,colors:{}};
    saleMap[k].qty+=qty; saleMap[k].ret+=ret; saleMap[k].act+=act;
    if(color){if(!saleMap[k].colors[color])saleMap[k].colors[color]=0; saleMap[k].colors[color]+=qty;}
    if(!stSales[store])stSales[store]={总销售数量:0,总零售金额:0,总成交金额:0};
    stSales[store].总销售数量+=qty; stSales[store].总零售金额+=ret; stSales[store].总成交金额+=act;
  }
  // Build storeData top10
  const byStore={};
  for(const v of Object.values(saleMap)){if(!byStore[v.store])byStore[v.store]=[];byStore[v.store].push(v);}
  const storeData={};
  for(const[st,its]of Object.entries(byStore)){
    its.sort((a,b)=>b.act-a.act);
    storeData[st]=its.slice(0,10).map((it,i)=>({rank:i+1,款号:it.sku,品名:it.name,销售数量:it.qty,零售金额:Math.round(it.ret*10)/10,成交金额:Math.round(it.act*10)/10,库存数量:0,库存金额:0,销售颜色:it.colors,库存颜色:{}}));
  }
  // Inventory map
  const invMap={}, stInv={};
  for(const r of RAW_INV){
    const store=r['店仓'],sku=r['款号'],name=r['品名'],color=r['颜色']||'';
    const qty=r['库存数量']||0,amt=r['库存金额']||0;
    const k=store+'||'+sku+'||'+name;
    if(!invMap[k])invMap[k]={qty:0,amt:0,colors:{}};
    invMap[k].qty+=qty; invMap[k].amt+=amt;
    if(color&&qty>0){if(!invMap[k].colors[color])invMap[k].colors[color]=0; invMap[k].colors[color]+=qty;}
    if(!stInv[store])stInv[store]={总库存数量:0,总库存金额:0};
    stInv[store].总库存数量+=qty; stInv[store].总库存金额+=amt;
  }
  for(const[st,its]of Object.entries(storeData)){
    for(const it of its){
      const k=st+'||'+it.款号+'||'+it.品名;
      if(invMap[k]){it.库存数量=invMap[k].qty;it.库存金额=Math.round(invMap[k].amt*10)/10;it.库存颜色=invMap[k].colors;}
    }
  }
  DATA={storeData,storeInv:stInv,storeSales:stSales};
  // Brand data
  const bSaleMap={};
  for(const r of filtered){
    const brand=r['品牌'],store=r['店仓'],sku=r['款号'],name=r['品名'],color=r['颜色']||'';
    const qty=r['数量']||0,ret=r['零售金额']||0,act=r['成交金额']||0;
    if(!brand||!sku)continue;
    const k=brand+'||'+sku+'||'+name;
    if(!bSaleMap[k])bSaleMap[k]={brand,sku,name,t_qty:0,t_ret:0,t_act:0,colors:{},store_map:{}};
    bSaleMap[k].t_qty+=qty;bSaleMap[k].t_ret+=ret;bSaleMap[k].t_act+=act;
    if(color){if(!bSaleMap[k].colors[color])bSaleMap[k].colors[color]=0;bSaleMap[k].colors[color]+=qty;}
    if(!bSaleMap[k].store_map[store])bSaleMap[k].store_map[store]={qty:0,ret:0,act:0,colors:{}};
    bSaleMap[k].store_map[store].qty+=qty;bSaleMap[k].store_map[store].ret+=ret;bSaleMap[k].store_map[store].act+=act;
    if(color){if(!bSaleMap[k].store_map[store].colors[color])bSaleMap[k].store_map[store].colors[color]=0;bSaleMap[k].store_map[store].colors[color]+=qty;}
  }
  const bInvMap={};
  for(const r of RAW_INV){
    const brand=r['品牌'],store=r['店仓'],sku=r['款号'],name=r['品名'],color=r['颜色']||'';
    const qty=r['库存数量']||0,amt=r['库存金额']||0;
    if(!brand||!sku)continue;
    const k=brand+'||'+sku+'||'+name;
    if(!bInvMap[k])bInvMap[k]={colors:{},store_map:{}};
    if(color&&qty>0){if(!bInvMap[k].colors[color])bInvMap[k].colors[color]=0;bInvMap[k].colors[color]+=qty;}
    if(!bInvMap[k].store_map[store])bInvMap[k].store_map[store]={qty:0,amt:0,colors:{}};
    bInvMap[k].store_map[store].qty+=qty;bInvMap[k].store_map[store].amt+=amt;
    if(color&&qty>0){if(!bInvMap[k].store_map[store].colors[color])bInvMap[k].store_map[store].colors[color]=0;bInvMap[k].store_map[store].colors[color]+=qty;}
  }
  const newBdata={};
  const dynamicBrands=[...new Set(Object.values(bSaleMap).map(x=>x.brand))].filter(Boolean);
  dynamicBrands.forEach(brand=>{ if(!BRAND_DOT[brand])BRAND_DOT[brand]=BRAND_PALETTE[Object.keys(BRAND_DOT).length%BRAND_PALETTE.length]; });
  for(const brand of dynamicBrands){
    const bItems=Object.values(bSaleMap).filter(x=>x.brand===brand).sort((a,b)=>b.t_act-a.t_act).slice(0,30);
    newBdata[brand]=bItems.map(it=>{
      const k=brand+'||'+it.sku+'||'+it.name;
      const allStores=new Set([...Object.keys(it.store_map),...Object.keys((bInvMap[k]||{}).store_map||{})]);
      const storeDetails=[...allStores].map(store=>{
        const s=it.store_map[store]||{qty:0,ret:0,act:0,colors:{}};
        const inv2=(bInvMap[k]?.store_map[store])||{qty:0,amt:0,colors:{}};
        return{店仓:store,销售件数:s.qty,零售金额:Math.round(s.ret*10)/10,成交金额:Math.round(s.act*10)/10,库存件数:inv2.qty,库存金额:Math.round(inv2.amt*10)/10,销售颜色:s.colors,库存颜色:inv2.colors};
      }).sort((a,b)=>b.成交金额-a.成交金额);
      return{款号:it.sku,品名:it.name,总销售件数:it.t_qty,总零售金额:Math.round(it.t_ret*10)/10,总成交金额:Math.round(it.t_act*10)/10,销售颜色:it.colors,库存颜色:(bInvMap[k]||{}).colors||{},店铺明细:storeDetails};
    });
  }
  BDATA=newBdata;
  currentStore=null;currentBrand=null;
  initSummary();renderStoreList();
  document.getElementById('storeContent').innerHTML='<div class="empty"><div class="e-icon">👈</div><p>请从左侧选择门店</p></div>';

function groupStores(stores){
  const g={};
  for(const s of stores){
    // Group by brand prefix dynamically
    const brand=Object.keys(BRAND_DOT).find(b=>s.startsWith(b))||Object.keys(BRAND_DOT).find(b=>s.includes(b.slice(0,2)))||'其他';
    const k=brand||'其他';
    if(!g[k])g[k]=[];g[k].push(s);
  }
  return g;
}
function renderStoreList(filter=""){
  const stores=Object.keys(DATA.storeData).filter(s=>!filter||s.includes(filter));
  const groups=groupStores(stores);const sales=DATA.storeSales;
  let html="";
  for(const[g,list]of Object.entries(groups)){
    html+=`<div><div class="grp-title">${g}（${list.length}）</div>`;
    list.sort((a,b)=>(sales[b]?.总成交金额||0)-(sales[a]?.总成交金额||0));
    for(const s of list){
      const dot=storeDot(s),amt=sales[s]?.总成交金额||0,active=s===currentStore?" active":"";

    }

  }
  document.getElementById("storeItems").innerHTML=html;
}

// ── FILE UPLOAD ───────────────────────────────────────────────────────────────
function handleFile(e){
  const file=e.target.files[0];if(!file)return;
  document.getElementById("uploadStatus").textContent="⏳ 正在解析…";
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:"array"});
      const sSheet=wb.SheetNames.find(n=>n.includes("销售")),iSheet=wb.SheetNames.find(n=>n.includes("库存"));
      if(!sSheet||!iSheet)throw new Error("未找到销售或库存工作表");
      const sd=XLSX.utils.sheet_to_json(wb.Sheets[sSheet]);
      const id=XLSX.utils.sheet_to_json(wb.Sheets[iSheet]);
      // Update raw data
      RAW_SALES=sd.map(r=>({店仓:r['店仓']||'',日期:parseInt(String(r['日期']||'').replace(/-/g,'')),款号:r['款号']||'',品名:r['品名']||'',品牌:r['品牌']||'',颜色:r['颜色']||'',数量:+(r['数量']||0),零售金额:Math.round((+(r['零售金额']||0))*10)/10,成交金额:Math.round((+(r['成交金额']||0))*10)/10}));
      RAW_INV=id.map(r=>({店仓:r['店仓']||'',款号:r['款号']||r['款号.款号']||'',品名:r['品名']||'',品牌:r['品牌']||'',颜色:r['颜色']||'',库存数量:+(r['库存数量']||0),库存金额:Math.round((+(r['库存金额']||0))*10)/10})).filter(r=>r.品牌!=='不分品牌');
      // Update date range
      const dates=RAW_SALES.map(r=>r['日期']).filter(Boolean);
      if(dates.length){
        dateFrom=Math.min(...dates);dateTo=Math.max(...dates);
        const toStr=d=>{const s=String(d);return s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8);};
        document.getElementById('dateFrom').value=toStr(dateFrom);
        document.getElementById('dateTo').value=toStr(dateTo);
        const fd=fmtDate(String(dateFrom)),td=fmtDate(String(dateTo));
        document.getElementById('dateRangeLabel').textContent=fd+' – '+td;
        document.getElementById('periodBadge').textContent=fd+' – '+td;
      }
      // Assign brand colors dynamically
      const newBrands=[...new Set(RAW_SALES.map(r=>r['品牌']).filter(Boolean))];
      newBrands.forEach(b=>{ if(!BRAND_DOT[b]) BRAND_DOT[b]=BRAND_PALETTE[Object.keys(BRAND_DOT).length%BRAND_PALETTE.length]; });
      document.getElementById("uploadStatus").textContent="✅ 已加载："+file.name;
      rebuildFromRaw();
    }catch(err){document.getElementById("uploadStatus").textContent="❌ 解析失败："+err.message;}
  };
  reader.readAsArrayBuffer(file);
}

let rankingSort = 'act';
function setRankingSort(m){
  rankingSort = m;
  document.querySelectorAll('#rankingSortTabs .sort-tab').forEach((b,i)=>b.classList.toggle('active',['act','ret','qty','inv'][i]===m));
  renderRanking();
}
function renderRanking(){
  const sales = DATA.storeSales, inv = DATA.storeInv;
  const stores = Object.keys(sales);
  if(!stores.length){ document.getElementById('rankingContent').innerHTML='<div class="empty"><div class="e-icon">📂</div><p>请先上传数据</p></div>'; return; }
  // Build store list with all metrics
  const list = stores.map(s=>({
    name: s,
    act: sales[s]?.总成交金额||0,
    ret: sales[s]?.总零售金额||0,
    qty: sales[s]?.总销售数量||0,
    inv: inv[s]?.总库存金额||0,
    invQty: inv[s]?.总库存数量||0,
  }));
  list.sort((a,b)=>b[rankingSort]-a[rankingSort]);
  const maxVal = Math.max(...list.map(s=>s[rankingSort]),1);
  const days = RAW_SALES.length ? (()=>{
    const dates = [...new Set(RAW_SALES.filter(r=>r['日期']>=dateFrom&&r['日期']<=dateTo).map(r=>r['日期']))];
    return Math.max(dates.length,1);
  })() : 18;

  const rows = list.map((s,i)=>{
    const val = s[rankingSort];
    const pct = Math.round((val/maxVal)*100);
    const label = rankingSort==='qty'? fmt(val)+'件' : '¥'+fmt(val);
    // Inventory health: ratio of inv to daily sales
    const dailySales = s.qty / days;
    const daysLeft = dailySales>0 ? Math.round(s.invQty/dailySales) : (s.invQty>0?999:0);
    const healthCls = daysLeft===0&&s.invQty===0 ? '' : daysLeft<7 ? 'inv-health-warn' : daysLeft>90&&s.invQty>0 ? 'inv-health-bad' : 'inv-health-ok';
    const healthTxt = s.invQty===0 ? '' : daysLeft>=999 ? '库存充足' : daysLeft>90 ? `⚠️ 库存积压` : daysLeft<7 ? `⚡ 约${daysLeft}天` : `约${daysLeft}天`;
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    return `<div class="rank-bar-row" onclick="switchTab('store');selectStore('${s.name.replace(/'/g,"\'")}')">
      <div class="rank-num">${medal||i+1}</div>
      <div class="rank-store-name">${s.name.replace(/^[^-]+-/,'')||s.name}</div>
      <div class="rank-bar-wrap">
        <div class="rank-bar-fill" style="width:${pct}%">
          ${pct>15?`<span class="rank-bar-label">${label}</span>`:''}
        </div>
      </div>
      ${pct<=15?`<div style="font-size:11px;color:var(--text);flex-shrink:0;width:60px">${label}</div>`:'<div style="width:60px"></div>'}
      <div class="rank-meta ${healthCls}">${healthTxt}</div>
    </div>`;
  }).join('');

  const legend = `<div style="display:flex;gap:16px;font-size:11px;margin-bottom:14px;flex-wrap:wrap;">
    <span style="color:var(--green)">● 库存充足</span>
    <span style="color:var(--gold)">● ⚡ 即将售罄（&lt;7天）</span>
    <span style="color:var(--warn)">● ⚠️ 库存积压（&gt;90天）</span>
    <span style="color:var(--muted);font-size:10px">点击门店可跳转查看详情</span>
  </div>`;
  // Top 15 for chart
  const chartList = list.slice(0,15);
  const chartLabels = chartList.map(s=>(s.name.replace(/^[^-]+-/,'')||s.name).slice(0,6));
  const chartVals = chartList.map(s=>Math.round(s[rankingSort]*10)/10);
  const chartLabel = rankingSort==='qty'?'销售件数':'金额(元)';
  const chartHtml = `<div class="chart-box"><div class="chart-title">门店销售对比（Top 15）</div><div class="chart-wrap"><canvas id="rankingChart"></canvas></div></div>`;
  document.getElementById('rankingContent').innerHTML = chartHtml + legend + rows;
  setTimeout(()=>drawBarChart('rankingChart', chartLabels, chartVals, chartLabel, '#7c5cbf'), 50);
}

let hotSort = 'act';
function setHotSort(m){
  hotSort = m;
  document.querySelectorAll('#hotTab .sort-tab').forEach((b,i)=>b.classList.toggle('active',['act','qty','days'][i]===m));
  renderHot();
}
function renderHot(){
  hotOpenItems.clear();
  const filtered = RAW_SALES.filter(r=>r['日期']>=dateFrom&&r['日期']<=dateTo);
  if(!filtered.length){ document.getElementById('hotContent').innerHTML='<div class="empty"><div class="e-icon">📂</div><p>请先上传数据</p></div>'; return; }

  // Aggregate all items across all stores
  const itemMap = {};
  for(const r of filtered){
    const sku=r['款号'], name=r['品名'], brand=r['品牌']||'', store=r['店仓']||'';
    if(!sku) continue;
    const k=sku+'||'+name;
    if(!itemMap[k]) itemMap[k]={sku,name,brand,qty:0,ret:0,act:0,stores:new Set(),storeMap:{}};
    itemMap[k].qty+=r['数量']||0;
    itemMap[k].ret+=r['零售金额']||0;
    itemMap[k].act+=r['成交金额']||0;
    itemMap[k].stores.add(store);
    if(store){
      if(!itemMap[k].storeMap[store]) itemMap[k].storeMap[store]={qty:0,ret:0,act:0};
      itemMap[k].storeMap[store].qty+=r['数量']||0;
      itemMap[k].storeMap[store].ret+=r['零售金额']||0;
      itemMap[k].storeMap[store].act+=r['成交金额']||0;
    }
  }
  // Add inventory
  for(const r of RAW_INV){
    const sku=r['款号'], name=r['品名'], store=r['店仓']||'';
    const k=sku+'||'+name;
    if(itemMap[k]){
      if(!itemMap[k].invQty) itemMap[k].invQty=0;
      itemMap[k].invQty+=(r['库存数量']||0);
      if(store){
        if(!itemMap[k].storeMap[store]) itemMap[k].storeMap[store]={qty:0,ret:0,act:0};
        if(!itemMap[k].storeMap[store].invQty) itemMap[k].storeMap[store].invQty=0;
        itemMap[k].storeMap[store].invQty+=(r['库存数量']||0);
      }
    }
  }

  // Calc days in period
  const dates=[...new Set(filtered.map(r=>r['日期']))];
  const periodDays = Math.max(dates.length,1);

  // Sort and top 30
  let items = Object.values(itemMap).map(it=>({
    ...it,
    invQty: it.invQty||0,
    dailySales: it.qty/periodDays,
    daysLeft: (it.invQty||0)>0 && it.qty>0 ? Math.round((it.invQty||0)/(it.qty/periodDays)) : (it.invQty>0?999:0),
    storeCount: it.stores.size,
    act: Math.round(it.act*10)/10,
    ret: Math.round(it.ret*10)/10,
  }));

  if(hotSort==='act') items.sort((a,b)=>b.act-a.act);
  else if(hotSort==='qty') items.sort((a,b)=>b.qty-a.qty);
  else items.sort((a,b)=>(a.daysLeft||999)-(b.daysLeft||999));
  items = items.slice(0,30);

  const maxAct = Math.max(...items.map(i=>i.act),1);

  const rows = items.map((it,i)=>{
    const rc = i<3?`rank-${i+1}`:'rank-n';
    const pct = Math.round((it.act/maxAct)*100);
    const d = disc(it.ret, it.act);
    let daysCls, daysTxt;
    if(it.invQty===0){ daysCls='hot-days-out'; daysTxt='⛔ 已售罄'; }

    else{ daysCls='hot-days-ok'; daysTxt=`约${it.daysLeft}天`; }

    // Build store breakdown rows
    const storeDetails = Object.entries(it.storeMap||{})
      .map(([store,s])=>({store,qty:s.qty||0,ret:s.ret||0,act:s.act||0,invQty:s.invQty||0}))

      </div>

        <div style="font-size:10px;color:var(--muted);margin-bottom:8px;">各门店明细（灰色=有库存未销售）</div>

  const chartHtml2 = `<div class="chart-box" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:center;">
    <div>
      <div class="chart-title" style="margin-bottom:8px;">品牌销售占比</div>
      <div class="chart-wrap" style="height:180px"><canvas id="hotDonutChart"></canvas></div>
    </div>
    <div>
      <div class="chart-title" style="margin-bottom:8px;">Top 10 单品成交额</div>
      <div class="chart-wrap" style="height:180px"><canvas id="hotBarChart"></canvas></div>
    </div>
  </div>`;
  const top10Labels = items.slice(0,10).map(it=>it.name.slice(0,6));
  const top10Data = items.slice(0,10).map(it=>Math.round(it.act));
  document.getElementById('hotContent').innerHTML = staleHtml + chartHtml2 + `<div style="font-size:11px;color:var(--muted);margin-bottom:12px;">预警天数 = 当前库存 ÷ 日均销售速度（基于所选时间段计算）</div>` + rows;
  setTimeout(()=>{
    drawDoughnutChart('hotDonutChart', donutLabels, donutData, donutColors);
    drawHorizontalBarChart('hotBarChart', top10Labels, top10Data, '成交金额', '#9b7de0');
  }, 50);
}

function renderStale(){
  const filtered = RAW_SALES.filter(r=>r['日期']>=dateFrom&&r['日期']<=dateTo);
  const soldSkus = new Set(filtered.map(r=>r['款号']+'||'+r['品名']));
  // Find items with inventory but no sales
  const invMap={};
  for(const r of RAW_INV){
    const k=r['款号']+'||'+r['品名'];
    if(!invMap[k]) invMap[k]={sku:r['款号'],name:r['品名'],brand:r['品牌']||'',qty:0,amt:0};
    invMap[k].qty+=r['库存数量']||0;
    invMap[k].amt+=r['库存金额']||0;
  }
  const stale = Object.entries(invMap)
    .filter(([k,v])=>!soldSkus.has(k)&&v.qty>0)
    .map(([k,v])=>v)
    .sort((a,b)=>b.amt-a.amt)
    .slice(0,50);

  if(!stale.length){ alert('没有找到滞销款'); return; }

  const rows = stale.map((it,i)=>`<tr>
    <td>${i+1}</td>
    <td><div style="font-weight:600">${it.name}</div><div style="font-size:10px;color:var(--muted)">${it.sku} · ${it.brand}</div></td>
    <td class="td-r"><span class="inv-health-bad">${it.qty}件</span></td>
    <td class="td-r" style="color:var(--muted)">¥${fmt(it.amt,1)}</td>
  </tr>`).join('');

  document.getElementById('hotContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <div style="font-size:15px;font-weight:700">⚠️ 滞销款（有库存·零销售）</div>
      <button class="sort-tab" onclick="renderHot()" style="font-size:11px">← 返回爆款</button>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:12px;">以下商品在所选时间段内有库存但销量为零，建议关注是否需要促销处理</div>
    <table class="top-table">
      <thead><tr><th>#</th><th>品名 / 款号</th><th class="r">库存件数</th><th class="r">库存金额</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}
